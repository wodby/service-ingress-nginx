name: ingress-nginx
title: Ingress Nginx
type: infrastructure
icon: nginx
scalable: false
annotations:
- name: proxy-buffer-size
  value: 32k
- name: proxy-body-size
  value: '0'
- name: annotations-risk-level
  value: Critical

helm:
  name: ingress-nginx
  source: https://kubernetes.github.io/ingress-nginx
  chart: ingress-nginx/ingress-nginx
  version: 4.13.2
  values:
# to set default no-indexation headers via 'configuration-snippet'  
  - name: controller.allowSnippetAnnotations
    value: true
workloads:
- id: main
  kind: deployment
  primary: true
  containers:
  - name: controller
    helm:
      resources: controller.resources
  helm:
    labels: controller.labels
    annotations: controller.config
