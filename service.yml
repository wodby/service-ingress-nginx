name: ingress-nginx
title: Ingress Nginx
type: infrastructure
icon: nginx
scalable: false
hostname: ingress-nginx
containers:
  - name: controller
annotations:
- name: proxy-buffer-size
  value: 32k
- name: proxy-body-size
  value: '0'
- name: use-proxy-protocol
  value: 'true'
# to set default no-indexation headers via 'configuration-snippet'
- name: allow-snippet-annotations
  value: 'true'
  
helm:
  name: ingress-nginx
  source: https://kubernetes.github.io/ingress-nginx
  chart: ingress-nginx/ingress-nginx
  version: 4.10.0
  configuration:
  - name: ingress-nginx
    annotations: controller.annotations
    labels: controller.labels
    resources: controller.resources    
    
